name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Create tarball (package already built by verify)
        id: pack
        run: echo "PACKAGE_TGZ=$(npm pack --silent --ignore-scripts)" >> "${GITHUB_ENV}"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "Skipping npm publish (configure NPM_TOKEN secret to enable)."
            exit 0
          fi
          npm publish "${PACKAGE_TGZ}" --access public

      - name: Upload to GitHub Release created by tag push
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
